name: Update Nuclear News Snapshot

on:
  push:
    branches: [master]
    paths-ignore:
      - 'data/**'
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: update-nuclear-news-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update data
        run: |
          set -o pipefail
          python scripts/update_news.py --output-dir data --window-hours 72 --archive-days 21 2>&1 | tee data/.pipeline.log

      - name: Upload pipeline log on failure
        if: failure()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/.pipeline.log
          git commit -m "ci: pipeline failure log"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if [ -n "$(git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]' || true)" ]; then
            echo "::error::Generated files under data/ were not staged:"
            git status --porcelain --untracked-files=all -- data/ | grep -v '^[MADRC]'
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update nuclear news snapshot"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4