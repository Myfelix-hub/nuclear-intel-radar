<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nuclear Intel Radar｜核能信息雷达</title>
    <meta
      name="description"
      content="自动聚合全球核能/核电行业信息：IAEA、NRC、SMR、核聚变、铀矿燃料、运行事件、政策法规 — 多源交叉验证，零噪音。"
    />
    <link rel="canonical" href="https://myfelix-hub.github.io/nuclear-intel-radar/" />
    <meta property="og:title" content="Nuclear Intel Radar｜核能信息雷达" />
    <meta
      property="og:description"
      content="自动聚合全球核能/核电行业信息：IAEA、NRC、SMR、核聚变、铀矿燃料、运行事件、政策法规。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://myfelix-hub.github.io/nuclear-intel-radar/" />
    <meta property="og:site_name" content="Nuclear Intel Radar" />
    <meta name="application-name" content="Nuclear Intel Radar" />
    <meta name="theme-color" content="#0F3A5C" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="核能信息雷达" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Nuclear Intel Radar｜核能信息雷达" />
    <meta
      name="twitter:description"
      content="自动聚合全球核能/核电行业信息：多源交叉验证，零噪音。"
    />
    <link rel="icon" href="./assets/logo.svg" type="image/svg+xml" />
    <link rel="icon" href="./assets/icons/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./assets/css/tokens.css" />
    <link rel="stylesheet" href="./assets/css/components.css" />
    <link rel="stylesheet" href="./assets/css/sections.css" />
    <link rel="stylesheet" href="./assets/css/dark.css" />
  </head>
  <body>
    <div class="nir-shell">
      <!-- Masthead -->
      <header class="nir-masthead">
        <div class="nir-masthead__brand">
          <img class="nir-masthead__logo" src="./assets/logo.svg" alt="Nuclear Intel Radar Logo" />
          <div>
            <div class="nir-masthead__title" data-i18n="brandTitle">核能信息雷达</div>
            <div class="nir-masthead__subtitle" data-i18n="brandSubtitle">Nuclear Intel Radar</div>
          </div>
        </div>
        <div class="nir-masthead__actions">
          <span id="sourceHealthPill" class="nir-health-pill" aria-live="polite" data-i18n="sourceStatusLoading">源状态加载中</span>
          <button
            id="themeToggle"
            class="nir-btn nir-btn-icon"
            type="button"
            data-i18n="toggleTheme"
            data-i18n-attr="aria-label"
            title="切换深色模式"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="5" />
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
            </svg>
          </button>
          <button
            id="langToggle"
            class="nir-btn nir-btn-icon"
            type="button"
            data-i18n="toggleLanguage"
            data-i18n-attr="aria-label"
            title="Switch to English"
            style="font-weight: 600; font-size: 0.8rem;"
          >
            EN
          </button>
          <a
            class="nir-btn nir-btn-ghost"
            href="https://github.com/Myfelix-hub/nuclear-intel-radar"
            target="_blank"
            rel="noopener noreferrer"
            data-i18n="github"
          >
            GitHub
          </a>
        </div>
      </header>

      <!-- Stats -->
      <section class="nir-stats" id="statsStrip" aria-label="数据概览">
        <div class="nir-stat">
          <div class="nir-stat__value" id="statTotal">—</div>
          <div class="nir-stat__label" data-i18n="statSignals">24h 核能信号</div>
        </div>
        <div class="nir-stat">
          <div class="nir-stat__value" id="statHighPriority">—</div>
          <div class="nir-stat__label" data-i18n="statHighPriority">重点信号</div>
        </div>
        <div class="nir-stat">
          <div class="nir-stat__value" id="statSources">—</div>
          <div class="nir-stat__label" data-i18n="statSources">活跃信源</div>
        </div>
        <div class="nir-stat">
          <div class="nir-stat__value" id="statUpdated">—</div>
          <div class="nir-stat__label" data-i18n="statUpdated">更新时间</div>
        </div>
      </section>

      <!-- Section tabs -->
      <nav class="nir-tabs" id="sectionTabs" role="tablist" aria-label="核能信息栏目"></nav>

      <!-- Controls -->
      <section class="nir-controls" aria-label="搜索与筛选">
        <div class="nir-controls__search">
          <input
            id="searchInput"
            class="nir-input"
            type="search"
            data-i18n="searchPlaceholder"
            data-i18n-attr="placeholder"
            placeholder="搜索核能信号 / 来源 / 标题"
            autocomplete="off"
          />
        </div>
        <details class="nir-disclosure" id="advancedFilters">
          <summary>
            <span data-i18n="advancedFilters">高级筛选</span>
            <span class="nir-text-muted" id="filterSummary" data-i18n="filterSummaryAll">全部</span>
          </summary>
          <div class="nir-disclosure__content">
            <div class="nir-flex nir-flex-col" style="gap: var(--nir-space-3);">
              <label class="nir-flex nir-items-center nir-gap-2">
                <span class="nir-text-soft" data-i18n="sourceType">来源类型</span>
                <select id="sourceTypeSelect" class="nir-input nir-select">
                  <option value="" data-i18n="sourceTypeAll">全部来源</option>
                  <option value="official" data-i18n="sourceTypeOfficial">官方 / 一手</option>
                  <option value="regulator" data-i18n="sourceTypeRegulator">监管机构</option>
                  <option value="nuclear_media" data-i18n="sourceTypeMedia">核能媒体</option>
                  <option value="industry" data-i18n="sourceTypeIndustry">产业 / 运营商</option>
                  <option value="research" data-i18n="sourceTypeResearch">学术 / 研究</option>
                  <option value="aggregator" data-i18n="sourceTypeAggregator">聚合 / 社区</option>
                </select>
              </label>
              <label class="nir-flex nir-items-center nir-gap-2">
                <span class="nir-text-soft" data-i18n="sortBy">排序</span>
                <select id="sortSelect" class="nir-input nir-select">
                  <option value="priority" data-i18n="sortPriority">综合优先级</option>
                  <option value="newest" data-i18n="sortNewest">最新发布</option>
                  <option value="score" data-i18n="sortScore">相关性分数</option>
                  <option value="source" data-i18n="sortSource">来源等级</option>
                </select>
              </label>
              <label class="nir-flex nir-items-center nir-gap-2">
                <input id="dedupeToggle" type="checkbox" checked />
                <span class="nir-text-soft" data-i18n="dedupe">去重</span>
              </label>
            </div>
          </div>
        </details>
      </section>

      <!-- Sticky summary -->
      <div class="nir-summary-bar" id="stickySummary" aria-live="polite">
        <span id="summaryText" data-i18n="summaryLoading">正在整理 24 小时信号…</span>
        <span class="nir-text-muted" id="resultCount"></span>
      </div>

      <!-- Top Stories -->
      <section class="nir-top-stories" id="topStories" aria-labelledby="topStoriesTitle">
        <div class="nir-top-stories__header">
          <h2 class="nir-top-stories__title" id="topStoriesTitle" data-i18n="topStoriesTitle">重点信号</h2>
          <div class="nir-list__toolbar">
            <button class="nir-btn is-active" id="storiesTimelineBtn" type="button" data-i18n="timeline">时间线</button>
            <button class="nir-btn" id="storiesHotBtn" type="button" data-i18n="hot">多源热点</button>
          </div>
        </div>
        <div class="nir-top-stories__grid" id="topStoriesGrid"></div>
      </section>

      <!-- News list -->
      <section class="nir-list" id="newsList" aria-labelledby="newsListTitle">
        <div class="nir-list__header">
          <h2 class="nir-list__title" id="newsListTitle" data-i18n="latestSignalsTitle">最新信号</h2>
        </div>
        <div class="nir-list__items" id="newsListItems"></div>
        <div class="nir-empty nir-hidden" id="newsListEmpty">
          <div class="nir-empty__title" data-i18n="noResultsTitle">该筛选条件下暂无信号</div>
          <p data-i18n="noResultsMessage">试试切换栏目、清除搜索词或调整筛选条件。</p>
        </div>
      </section>

      <!-- Community (tab-only visibility controlled by JS) -->
      <section class="nir-community nir-hidden" id="communitySection" aria-labelledby="communityTitle">
        <div class="nir-community__header">
          <h2 class="nir-list__title" id="communityTitle" data-i18n="communityTitle">社区动态 · HN / Reddit r/nuclear</h2>
          <div class="nir-list__toolbar">
            <button class="nir-btn is-active" id="communityTodayBtn" type="button" data-i18n="today">今日</button>
            <button class="nir-btn" id="community7dBtn" type="button" data-i18n="sevenDays">7 天</button>
          </div>
        </div>
        <div class="nir-list__items" id="communityItems"></div>
      </section>

      <!-- Diagnostics (gated) -->
      <section class="nir-diagnostics nir-hidden" id="diagnosticsPanel" aria-labelledby="diagnosticsTitle">
        <h2 class="nir-diagnostics__title" id="diagnosticsTitle" data-i18n="diagnosticsTitle">运维诊断</h2>
        <div id="diagnosticsContent"></div>
      </section>

      <!-- Footer -->
      <footer class="nir-footer">
        <p>
          <span data-i18n="footer">Nuclear Intel Radar · 数据每 30 分钟自动更新 ·</span>
          <a href="?diagnostics=1" data-i18n="diagnosticsLink">运维诊断</a>
        </p>
      </footer>
    </div>

    <!-- Scripts -->
    <script src="./assets/js/utils.js"></script>
    <script src="./assets/js/i18n.js"></script>
    <script src="./assets/js/state.js"></script>
    <script src="./assets/js/ui.js"></script>
    <script src="./assets/js/sections.js"></script>
    <script src="./assets/js/filters.js"></script>
    <script src="./assets/js/stories.js"></script>
    <script src="./assets/js/community.js"></script>
    <script src="./assets/js/diagnostics.js"></script>
    <script src="./assets/js/main.js"></script>
    <script src="./assets/motion.js"></script>
  </body>
</html>
